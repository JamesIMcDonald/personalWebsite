server {
    listen 80;
    server_name j-mcd.com api.j-mcd.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name j-mcd.com;

    ssl_certificate /etc/letsencrypt/live/j-mcd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j-mcd.com/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.j-mcd.com;

    ssl_certificate /etc/letsencrypt/live/j-mcd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j-mcd.com/privkey.pem;

    location / {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name www.j-mcd.com;

    ssl_certificate /etc/letsencrypt/live/j-mcd.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j-mcd.com/privkey.pem;

    return 301 https://j-mcd.com$request_uri;
}